version: "3"

services:
  backend:
    build: ./backend
    container_name: backend
    environment:
      - PORT=5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
