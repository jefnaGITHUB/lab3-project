variables:
  backendImage: jefna/lab3-project-backend
  frontendImage: jefna/lab3-project-frontend
  imageTag: latest

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: AzureRmWebAppDeployment@5
  displayName: "Deploy backend to Azure"
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'sc-f29ds-rd2055'
    appType: 'webAppContainer'
    WebAppName: 'rd2055-lab3'
    DockerNamespace: 'jefna'
    DockerRepository: $(backendImage)
    DockerImageTag: '$(imageTag)'

- task: AzureRmWebAppDeployment@5
  displayName: "Deploy frontend to Azure"
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'sc-f29ds-rd2055'
    appType: 'webAppContainer'
    WebAppName: 'rd2055-lab3-frontend'
    DockerNamespace: 'jefna'
    DockerRepository: $(frontendImage)
    DockerImageTag: '$(imageTag)'